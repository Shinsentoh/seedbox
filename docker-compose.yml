version: "3.7"

services:
#region Containers
    #region NetWork
    traefik:
        image: traefik
        container_name: traefik
        restart: always
        command:
            - "--certificatesresolvers.leresolver.acme.email=${ACME_MAIL}"
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - traefikBehaviour:/etc/traefik:ro
            - configTraefik:/config
        environment:
            - TRAEFIK_DOMAIN=${TRAEFIK_DOMAIN}
            - TZ=${TZ}
        labels:
            - "traefik.enable=true"
            # Docker labels for enabling Traefik dashboard
            - "traefik.http.routers.traefik.rule=Host(`${TRAEFIK_SUB_DOMAIN}.${TRAEFIK_DOMAIN}`)"
            - "traefik.http.routers.traefik.service=api@internal"
            - "traefik.http.routers.traefik.middlewares=common-auth@file"
            - "traefik.http.services.traefik.loadbalancer.server.port=8080"
            - "com.centurylinklabs.watchtower.enable=false"
    #endregion

    #region Streaming/Reader
    plex:
        image: linuxserver/plex
        container_name: plex
        restart: always
        volumes:
            - configPlex:/config
            - media:/data
            - torrents:/downloads
            - /tmp:/tmp
        ports:
            - "32400:32400/tcp"
            - "3005:3005/tcp"
            - "8324:8324/tcp"
            - "32469:32469/tcp"
            - "1900:1900/udp"
            - "32410:32410/udp"
            - "32412:32412/udp"
            - "32413:32413/udp"
            - "32414:32414/udp"
        environment:
            - PGID=${PGID}
            - PUID=${PUID}
            - TZ=${TZ}
            - VERSION=docker
            - PLEX_CLAIM=claim-79WzwTKf-8BUQzL33zR2
            - ADVERTISE_IP=https://${PLEX_SUB_DOMAIN}.${TRAEFIK_DOMAIN}:443
        labels:
            - "traefik.enable=true"
            - "traefik.http.services.plex.loadbalancer.server.port=32400"
            - "traefik.http.routers.plex.rule=Host(`${PLEX_SUB_DOMAIN}.${TRAEFIK_DOMAIN}`)"
            - "traefik.http.routers.plex.service=plex"
        depends_on:
            - traefik

    seerr:
        image: seerr/seerr:develop
        init: true
        container_name: seerr
        environment:
            # - PGID=${PGID}
            # - PUID=${PUID}
            - TZ=${TZ}
        ports:
            - 5055:5055
        volumes:
            - configSeerr:/app/config
        restart: unless-stopped
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.seerr.rule=Host(`${REQUEST_SUB_DOMAIN}.${TRAEFIK_DOMAIN}`)"
            - "traefik.http.routers.seerr.service=seerr"
            - "traefik.http.services.seerr.loadbalancer.server.port=5055"
        depends_on:
            - traefik
    #endregion

    #region Downloader

    # gluetun:
    #     image: qmcgaw/gluetun
    #     container_name: gluetun
    #     cap_add:
    #         - NET_ADMIN
    #     devices:
