version: "3.7"
services:
    cnv-arena-client:
        build:
            context: ../tactic_tcg_betatest
            dockerfile: Dockerfile.client
        container_name: cnv-arena-client
        restart: unless-stopped
        environment:
            - NODE_ENV=production
            - VITE_SERVER_URL=cnv-arena-server:3001
        labels:
            - "traefik.enable=true"
            - "traefik.http.services.cnv-arena-client.loadbalancer.server.port=80"
            - "traefik.http.routers.cnv-arena-client.rule=Host(`canvas-arena.${TRAEFIK_DOMAIN}`)"
            - "traefik.http.routers.cnv-arena-client.service=cnv-arena-client"
        depends_on:
            - traefik
            - cnv-arena-server

    cnv-arena-server:
        build:
            context: ../tactic_tcg_betatest
            dockerfile: Dockerfile.server
        container_name: cnv-arena-server
        restart: unless-stopped
        environment:
            - NODE_ENV=production
        depends_on:
            - traefik
